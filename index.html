<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINTRO - Reporte Meteorológico</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .logo { display: block; max-width: 120px; margin: 0 auto 15px; }
        select { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #00274d; border-radius: 8px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; background: #d1d9e6; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn.active { background: #00274d; color: white; }
        #chart { width: 100%; height: 300px; }
        iframe { width: 100%; height: 400px; border: none; border-radius: 8px; }
    </style>
</head>
<body>

<img src="logo.png" class="logo" alt="Logo SINTRO">

<div class="card">
    <label><strong>Seleccione Año de Estudio:</strong></label>
    <select id="yearSelect">
        <option value="TODOS">TODOS LOS AÑOS (Promedio Histórico)</option>
    </select>

    <div class="btn-group">
        <button class="btn active" id="btnH" onclick="toggle('historial')">Análisis Histórico</button>
        <button class="btn" id="btnP" onclick="toggle('pronostico')">Pronóstico Ventusky</button>
    </div>

    <div id="historial" style="display:block; margin-top:20px;">
        <div id="chart"></div>
    </div>

    <div id="pronostico" style="display:none; margin-top:20px;">
        <iframe src="https://www.ventusky.com/es/caracas"></iframe>
    </div>
</div>

<script>
    let datos = [];
    Papa.parse("PREC_DOM_MIGUEL.csv", {
        download: true, header: true, delimiter: ";", dynamicTyping: true,
        complete: function(res) {
            datos = res.data.filter(r => r.FECHA);
            let years = [...new Set(datos.map(r => String(r.FECHA).substring(0,4)))].sort();
            let sel = document.getElementById('yearSelect');
            years.forEach(y => sel.innerHTML += `<option value="${y}">${y}</option>`);
            sel.onchange = render;
            render();
        }
    });

    function toggle(tab) {
        document.getElementById('historial').style.display = (tab === 'historial') ? 'block' : 'none';
        document.getElementById('pronostico').style.display = (tab === 'pronostico') ? 'block' : 'none';
        document.getElementById('btnH').className = (tab === 'historial') ? 'btn active' : 'btn';
        document.getElementById('btnP').className = (tab === 'pronostico') ? 'btn active' : 'btn';
    }

    function render() {
        let y = document.getElementById('yearSelect').value;
        let f = (y === "TODOS") ? datos : datos.filter(r => String(r.FECHA).substring(0,4) == y);
        let m = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        let v = m.map((_, i) => f.filter(r => parseInt(String(r.FECHA).substring(4,6)) == i+1).reduce((a,b) => a + (parseFloat(String(b.PRECTOTCORR).replace(',','.')) || 0), 0) / (y === "TODOS" ? 27 : 1));
        
        Plotly.newPlot('chart', [{x: m, y: v, type: 'bar', marker: {color: '#00274d'}}], 
        {title: 'Precipitación ' + y, margin: {t:30, l:40, r:10, b:40}, autosize: true});
    }
</script>
</body>
</html>
