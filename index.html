<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informe SINTRO - Análisis Meteorológico</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: #fff; padding: 15px 25px; display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        header img { height: 50px; margin-right: 20px; }
        .main-container { display: flex; flex-wrap: wrap; gap: 20px; padding: 25px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .col-left { flex: 2; min-width: 320px; }
        .col-right { flex: 1; min-width: 300px; }
        .plot { width: 100%; height: 450px; }
        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #ced4da; font-size: 15px; }
        button { background: #0056b3; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #004494; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="SINTRO Logo">
    <h2>Informe Meteorológico SINTRO</h2>
</header>

<div class="main-container">
    <div class="col-left">
        <div class="card">
            <h3>Histórico de Precipitación (Promedio Mensual)</h3>
            <div id="chart" class="plot"></div>
        </div>
    </div>
    
    <div class="col-right">
        <div class="card">
            <h3>Selección de Análisis</h3>
            <select id="yearSelect"></select>
            <button onclick="generarGrafica()">Visualizar Año</button>
            <hr style="margin: 20px 0;">
            <h3>Pronóstico Actual</h3>
            <iframe src="https://www.meteored.com.ve/wcomp/widget_mapa_local/1-23847" style="width:100%; height:200px; border:none;"></iframe>
        </div>
    </div>
</div>

<script>
    let datos = [];
    Papa.parse("PREC_DOM_MIGUEL.csv", {
        download: true, header: true, delimiter: ";",
        complete: function(results) {
            datos = results.data.map(r => ({
                fecha: String(r.FECHA),
                val: parseFloat(String(r.PRECTOTCORR).replace(',', '.')) || 0
            }));
            const years = [...new Set(datos.map(r => r.fecha.substring(0,4)))].filter(y => y.length === 4).sort();
            const select = document.getElementById('yearSelect');
            years.forEach(y => select.innerHTML += `<option value="${y}">${y}</option>`);
            generarGrafica();
        }
    });

    function generarGrafica() {
        const y = document.getElementById('yearSelect').value;
        const filtrados = datos.filter(r => r.fecha.substring(0,4) == y);
        const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        const valores = meses.map((_, i) => filtrados.filter(r => parseInt(r.fecha.substring(4,6)) == i+1).reduce((a,b) => a + b.val, 0) / 30);
        
        Plotly.newPlot('chart', [{ x: meses, y: valores, type: 'bar', marker: {color: '#28a745'} }], 
        { title: 'Precipitación promedio ' + y + ' (mm)', margin: {t:40, l:50, r:20, b:40} });
    }
</script>
</body>
</html>
